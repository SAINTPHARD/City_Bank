services:
  - type: static
    name: citybank-cliente
    rootDir: frontend-cliente
    buildCommand: npm ci && npm run build
    staticPublishPath: dist
    routes:
      - type: rewrite
        source: /*
        destination: /index.html
    envVars:
      - key: VITE_API_BASE_URL
        value: https://citybank-api.onrender.com/api

  - type: static
    name: citybank-admin
    rootDir: frontend-admin
    buildCommand: npm ci && npm run build
    staticPublishPath: dist
    routes:
      - type: rewrite
        source: /*
        destination: /index.html
    envVars:
      - key: VITE_API_BASE_URL
        value: https://citybank-api.onrender.com/api

  - type: web
    name: citybank-api
    runtime: java
    plan: free
    rootDir: backend
    buildCommand: ./mvnw clean package -DskipTests
    startCommand: java -jar target/bank-api-0.0.1-SNAPSHOT.jar
    envVars:
      - key: SERVER_PORT
        value: 10000
      - key: JWT_SECRET
        sync: false
      - key: SPRING_DATASOURCE_URL
        sync: false
      - key: SPRING_DATASOURCE_USERNAME
        sync: false
      - key: SPRING_DATASOURCE_PASSWORD
        sync: false
