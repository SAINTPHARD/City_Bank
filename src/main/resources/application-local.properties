# Profile local - usando H2 em memoria para desenvolvimento
# Datasource H2 em memoria
spring.datasource.url=jdbc:h2:mem:bankdb;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=

# JPA e Hibernate para H2
spring.jpa.hibernate.ddl-auto=create-drop
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.H2Dialect

# Hikari pool para dev
spring.datasource.hikari.maximum-pool-size=5
spring.datasource.hikari.minimum-idle=1

# Actuator
management.endpoints.web.exposure.include=health,info

# H2 console
spring.h2.console.enabled=true
spring.h2.console.path=/h2-console

# Porta local
server.port=8081