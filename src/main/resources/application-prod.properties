# Profile producao - usando PostgreSQL
# Datasource PostgreSQL - configure via variaveis de ambiente em producao
spring.datasource.url=${DB_URL:jdbc:postgresql://localhost:5432/bankdb}
spring.datasource.driver-class-name=org.postgresql.Driver
spring.datasource.username=${DB_USER:postgres}
spring.datasource.password=${DB_PASS:postgres}

# JPA e Hibernate
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect

# Hikari pool para producao - maior
spring.datasource.hikari.pool-name=BankHikariCP-Prod
spring.datasource.hikari.maximum-pool-size=20
spring.datasource.hikari.minimum-idle=5
spring.datasource.hikari.connection-timeout=30000

# Logging em producao
logging.level.root=WARN
logging.level.org.springframework=WARN
logging.level.com.citybank=INFO
logging.level.com.safewallet=INFO

# Server port
server.port=8080

# Actuator (restrito em producao)
management.endpoints.web.exposure.include=health
management.endpoint.health.show-details=when_authorized
