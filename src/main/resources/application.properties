# ---------- APP ----------
spring.application.name=city_bank

# ---------- DATABASE (MySQL) ----------
spring.datasource.url=${DB_URL:jdbc:mysql://localhost:3306/bankdb?useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true}
spring.datasource.username=${DB_USER:root}
spring.datasource.password=${DB_PASS:Root@123}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# ---------- Hikari (pool) ----------
spring.datasource.hikari.pool-name=BankHikariCP
spring.datasource.hikari.minimum-idle=2
spring.datasource.hikari.maximum-pool-size=10
spring.datasource.hikari.connection-timeout=30000
spring.datasource.hikari.idle-timeout=30000
spring.datasource.hikari.max-lifetime=1800000

# ---------- JPA ----------
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect
spring.jpa.properties.hibernate.jdbc.time_zone=UTC

# 🔥 ESSENCIAL (corrige warning do seu log)
spring.jpa.open-in-view=false

# ---------- SERVER ----------
server.port=8080
server.servlet.context-path=/api

# ---------- JACKSON ----------
spring.jackson.time-zone=UTC
spring.jackson.serialization.write-dates-as-timestamps=false

# ---------- LOG ----------
logging.level.root=INFO
logging.level.org.springframework=INFO
logging.level.com.citybank=DEBUG

# ---------- ACTUATOR ----------
management.endpoints.web.exposure.include=health,info,metrics
management.endpoint.health.show-details=when_authorized

# ---------- PROFILE ----------
spring.profiles.active=local