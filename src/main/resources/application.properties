spring.application.name=bank-api

# ---------- Banco de Dados (PostgreSQL) ----------
# Use variáveis de ambiente para não manter credenciais em texto puro.
spring.datasource.url=${DB_URL:jdbc:postgresql://localhost:5432/bankdb}
spring.datasource.username=${DB_USER:postgres}
spring.datasource.password=${DB_PASS:postgres}

# Usa HikariCP (padrão no Spring Boot) - ajustes comuns de pool
spring.datasource.type=com.zaxxer.hikari.HikariDataSource
spring.datasource.hikari.pool-name=BankHikariCP
spring.datasource.hikari.minimum-idle=2
spring.datasource.hikari.maximum-pool-size=10
spring.datasource.hikari.connection-timeout=30000
spring.datasource.hikari.idle-timeout=30000
spring.datasource.hikari.max-lifetime=1800000

# ---------- JPA / Hibernate ----------
# update: atualiza esquema automaticamente (útil em dev). Em produção prefira validate ou gerenciar migrações com Flyway/Liquibase.
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
# PostgreSQL dialect
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect
# Definir fuso horário consistente
spring.jpa.properties.hibernate.jdbc.time_zone=UTC

# ---------- Server / Contexto ----------
server.port=8080
# Uncomment abaixo se quiser prefixar todas as rotas com /api
server.servlet.context-path=/api

# ---------- Jackson / JSON ----------
spring.jackson.time-zone=UTC
spring.jackson.serialization.write-dates-as-timestamps=false

# ---------- Logging ----------
logging.level.root=INFO
logging.level.org.springframework=INFO
logging.level.com.citybank=DEBUG
logging.level.com.safewallet=DEBUG

# ---------- Actuator (saúde/monitoramento) ----------
# Expor endpoints úteis (em dev) - em produção ajuste conforme necessário e proteja com autenticação
management.endpoints.web.exposure.include=health,info,metrics
management.endpoint.health.show-details=when_authorized

# ---------- Perfis ----------
# Defina profile via SPRING_PROFILES_ACTIVE em produção
spring.profiles.active=local

# ---------- Observações ----------
# 1) Para evitar armazenar senhas em texto, exporte variáveis de ambiente antes de iniciar a aplicação:
#    no Windows (cmd):    set DB_URL=jdbc:postgresql://localhost:5432/bankdb\n    set DB_USER=postgres\n    set DB_PASS=sua_senha
# 2) Em ambientes de CI/CD/produção, considere usar um gerenciador de segredos.
# 3) Se quiser usar o wrapper do Maven (mvnw) para rodar localmente no Windows: .\mvnw.cmd spring-boot:run
# 4) PostgreSQL: certifique-se de que o servidor PostgreSQL está rodando localmente (padrão: localhost:5432)