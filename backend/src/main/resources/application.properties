# ---------- APP ----------
spring.application.name=city_bank

# ---------- JPA ----------
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
#spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect
spring.jpa.properties.hibernate.jdbc.time_zone=UTC

# 🔥 ESSENCIAL (corrige warning do seu log)
spring.jpa.open-in-view=false

# ---------- SERVER ----------
server.port=8080
server.servlet.context-path=/api

# ---------- SECURITY / JWT ----------
api.security.token.secret=${JWT_SECRET:api.security.token.secret=citybank-super-secret-key-development-2025-citybank}

# ---------- JACKSON ----------
spring.jackson.time-zone=UTC
spring.jackson.serialization.write-dates-as-timestamps=false

# ---------- LOG ----------
logging.level.root=INFO
logging.level.org.springframework=INFO
logging.level.com.citybank=DEBUG

# ---------- ACTUATOR ----------
management.endpoints.web.exposure.include=health,info,metrics
management.endpoint.health.show-details=when_authorized

# ---------- PROFILE ----------
spring.profiles.active=local
