# ---------- DATABASE LOCAL (MySQL) ----------
spring.datasource.url=${DB_URL:jdbc:mysql://localhost:3306/citybank?useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true}
spring.datasource.username=${DB_USER:root}
spring.datasource.password=${DB_PASS:Root@123}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# ---------- Hikari (pool) ----------
spring.datasource.hikari.pool-name=BankHikariCP
spring.datasource.hikari.minimum-idle=2
spring.datasource.hikari.maximum-pool-size=10
spring.datasource.hikari.connection-timeout=30000
spring.datasource.hikari.idle-timeout=30000
spring.datasource.hikari.max-lifetime=1800000
